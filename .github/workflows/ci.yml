name: Lint and format checks

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Black check
        run: black --check .

      - name: Run unit tests
        env:
          DATA_DIR: dev-data
          DEV_MODE: "true"
        run: |
          python -m tests.test_deck_service
          python -m tests.test_share_service
          python -m tests.test_game_visibility
          python -m tests.test_color_facet
          python -m tests.test_route_smoke
          python -m tests.test_location_add_card
          python -m tests.test_variant_groups
