name: Lint and format checks

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run unit tests
        env:
          DEV_MODE: "true"
        # Single pytest invocation collects ALL of tests/ (v3.37.0 migration) —
        # this now includes the seam tests (test_scryfall_cache,
        # test_bulk_data_loop) and test_auth_csrf that the old per-module list
        # omitted. DATA_DIR is set by tests/conftest.py to a temp dir.
        run: pytest tests/
