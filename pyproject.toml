[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "build",
  "dist",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
]
ignore = [
  "E501",
  "B008"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
  # Pre-existing app tech debt (datetime.utcnow(), FastAPI on_event) — warnings,
  # not failures, and they predate this suite. Silenced to keep `pytest` output
  # readable; flagged for a separate cleanup before the next Python/dep upgrade.
  "ignore::DeprecationWarning",
]

[tool.vulture]
min_confidence = 80
paths = ["app", "main.py"]
ignore_decorators = ["@app.*", "@router.*", "@*.get", "@*.post", "@*.put", "@*.delete"]

[tool.deptry]
ignore = []

[tool.deptry.per_rule_ignores]
DEP002 = ["uvicorn", "jinja2", "python-multipart", "itsdangerous", "psycopg"]
DEP003 = ["starlette", "urllib3"]
